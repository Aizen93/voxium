<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="v" x1="180" y1="140" x2="332" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="wave" x1="300" y1="160" x2="420" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Stylized V -->
  <path d="M148 148 L256 372 L322 224" stroke="url(#v)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Soundwave arcs radiating from the V -->
  <path d="M340 200 C370 230, 370 290, 340 320" stroke="url(#wave)" stroke-width="24" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M380 168 C425 215, 425 305, 380 352" stroke="url(#wave)" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M418 140 C478 200, 478 320, 418 380" stroke="url(#wave)" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
