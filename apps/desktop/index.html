<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <title>Voxium</title>
    <style>
      /* Inline splash screen — shown before React/Tailwind loads */
      body { margin: 0; background: #1a1a2e; color: #e4e6eb; font-family: 'Inter', system-ui, sans-serif; }
      #splash {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 9999;
        background: #1a1a2e; transition: opacity 0.3s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash svg { width: 48px; height: 48px; margin-bottom: 16px; }
      #splash .name { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 24px; }
      #splash .spinner {
        width: 24px; height: 24px; border: 2.5px solid rgba(91,91,247,0.2);
        border-top-color: #5b5bf7; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash screen — removed by React after mount -->
    <div id="splash">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l7 4.5-7 4.5z" fill="#5b5bf7"/>
      </svg>
      <div class="name">Voxium</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
