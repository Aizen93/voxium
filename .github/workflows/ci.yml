name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Typecheck (shared -> server -> desktop -> admin)
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Build shared
        run: pnpm build:shared

      - name: Build server
        run: pnpm build:server

      - name: Build desktop
        run: pnpm build:desktop

      - name: Build admin
        run: pnpm build:admin

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: voxium
          POSTGRES_PASSWORD: voxium
          POSTGRES_DB: voxium
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U voxium"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate Prisma client
        working-directory: apps/server
        run: npx prisma generate

      - name: Run database migrations
        working-directory: apps/server
        env:
          DATABASE_URL: postgresql://voxium:voxium@localhost:5432/voxium
        run: npx prisma migrate deploy

      - name: Build shared
        run: pnpm build:shared

      - name: Create server .env
        env:
          ENV_CONTENT: |
            DATABASE_URL=postgresql://voxium:voxium@localhost:5432/voxium
            REDIS_URL=redis://localhost:6379
            JWT_SECRET=ci-test-jwt-secret-not-for-production
            JWT_REFRESH_SECRET=ci-test-refresh-secret-not-for-production
            PORT=3001
            CORS_ORIGIN=http://localhost:8080,http://localhost:8082
            S3_ASSETS_ENDPOINT=http://localhost:9000
            S3_ASSETS_REGION=us-east-1
            S3_ACCESS_KEY=ci-test-key
            S3_SECRET_KEY=ci-test-secret
            S3_ASSETS_BUCKET=ci-test-bucket
            SMTP_HOST=localhost
            SMTP_PORT=1025
            SMTP_FROM=noreply@test.local
            CLIENT_URL=http://localhost:8080
        run: echo "$ENV_CONTENT" > apps/server/.env

      - name: Debug - verify .env and connectivity
        run: |
          echo "=== .env contents ==="
          cat apps/server/.env
          echo "=== PostgreSQL ==="
          pg_isready -h localhost -p 5432 -U voxium || echo "PostgreSQL not ready"
          echo "=== Redis ==="
          redis-cli -h localhost ping || echo "Redis not ready"

      - name: Start servers
        run: |
          # Start server in background
          pnpm dev:server &
          # Start desktop in background
          pnpm dev:desktop &
          # Start admin in background
          pnpm dev:admin &

          # Wait for server to respond (any status — 503 is fine, means server is up)
          echo "Waiting for server (http://localhost:3001/health)..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null) || true
            if [ "$HTTP_CODE" != "000" ] && [ -n "$HTTP_CODE" ]; then
              echo "Server responding after ${i}s (HTTP $HTTP_CODE)"
              # Print health details for diagnostics
              curl -s http://localhost:3001/health | head -c 500
              echo ""
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Server failed to respond within 60s"
              exit 1
            fi
            sleep 1
          done

          # Wait for desktop
          echo "Waiting for desktop (http://localhost:8080)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Desktop ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Desktop failed to start within 60s"
              exit 1
            fi
            sleep 1
          done

          # Wait for admin
          echo "Waiting for admin (http://localhost:8082)..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8082 > /dev/null 2>&1; then
              echo "Admin ready after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Admin failed to start within 60s"
              exit 1
            fi
            sleep 1
          done

          echo "All servers ready!"

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: true
